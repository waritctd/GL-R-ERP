# Ephemeral local UAT stack for the automated harness: Postgres (no named volume -> wiped on `down`,
# so every run starts from a fresh V1-V36 + V900-V903 seed) + the backend on SPRING_PROFILES_ACTIVE=uat.
# APP_MAIL_PROVIDER=log so the harness never sends email.
name: glr-uat-tests
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hris
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hris"]
      interval: 3s
      timeout: 3s
      retries: 20
  backend:
    build:
      context: ../../backend
      dockerfile: ./Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: uat
      APP_FLYWAY_ENABLED: "true"
      APP_MAIL_PROVIDER: log
      SERVER_SESSION_COOKIE_SECURE: "false"
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/hris
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      APP_CORS_ALLOWED_ORIGINS: http://localhost:8099
    ports:
      - "8099:8080"
