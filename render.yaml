# Render Blueprint for the GL&R HR Spring Boot backend.
# Import via Render Dashboard -> New -> Blueprint, pointing at this repo.
# The service name is pinned so the public URL is deterministic:
#   https://glr-hr-backend.onrender.com
# which is what the Vercel frontend proxies /api to (see frontend/vercel.json).
services:
  - type: web
    name: glr-hr-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    region: singapore          # closest Render region to the Supabase ap-northeast-1 DB
    plan: free                 # free tier cold-starts after inactivity; upgrade for prod
    autoDeploy: true
    envVars:
      # Do NOT enable the demo profile in production (it turns on passwordless quick-login).
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: APP_FLYWAY_ENABLED
        value: "true"
      # Frontend origin is only needed as a CORS fallback; the Vercel proxy keeps calls
      # same-origin so CORS normally isn't exercised. Replace with your real Vercel URL.
      - key: APP_CORS_ALLOWED_ORIGINS
        value: https://your-app.vercel.app
      # Secrets — set these in the Render dashboard (sync:false keeps them out of git).
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
