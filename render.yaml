# Render Blueprint for the GL&R HR Spring Boot backend.
# Import via Render Dashboard -> New -> Blueprint, pointing at this repo.
# The service name is pinned so the public URL is deterministic:
#   https://gl-r-erp.onrender.com
# which is what the Vercel frontend proxies /api to (see frontend/vercel.json).
services:
  - type: web
    name: gl-r-erp
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    region: singapore          # closest Render region to the Supabase ap-northeast-1 DB
    plan: starter              # free tier is CPU-throttled (slow startup races the port scan) and cold-starts; starter avoids both
    autoDeploy: true
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: APP_FLYWAY_ENABLED
        value: "true"
      # Frontend origin is only needed as a CORS fallback; the Vercel proxy keeps calls
      # same-origin so CORS normally isn't exercised.
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
      # Secrets — set these in the Render dashboard (sync:false keeps them out of git).
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: APP_ATTENDANCE_AGENT_TOKEN
        sync: false

  # Dedicated UAT stack — separate service, separate DB, auto-deploys from the `uat`
  # integration branch. Backlog features merge to `uat` for stakeholder acceptance
  # testing, then promote to main. The ONLY functional difference from gl-r-erp is the
  # `uat` Spring profile, which applies db/migration-uat (synthetic, PII-free seed) instead
  # of the demo seed. Point SPRING_DATASOURCE_* at a NEW UAT-only Supabase project — never
  # the demo DB and never a real-prod DB (a UAT payroll run bank-exports the seeded fake
  # account numbers, which must stay isolated).
  - type: web
    name: gl-r-erp-uat
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    region: singapore
    plan: starter
    branch: uat                # auto-deploy from the UAT integration branch
    autoDeploy: true
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: uat             # pinned in git (reviewable); a stray `prod` would seed demo data / wrong DB
      - key: APP_FLYWAY_ENABLED
        value: "true"
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false            # set to the UAT Vercel origin in the dashboard
      # Test-only: redirect every notification email to one real inbox (regardless of the seeded
      # employee's actual/fake address) so the email pipeline can be verified end-to-end. Blank on
      # gl-r-erp (demo/prod) above, so this has zero effect there. See NotificationEmailService.
      - key: APP_MAIL_OVERRIDE_TO
        value: fasaiglrhr@gmail.com
      - key: APP_MAIL_SUBJECT_PREFIX
        value: "[UAT TEST] "
      # Secrets — set in the Render dashboard, pointing at the NEW UAT Supabase project only.
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: APP_ATTENDANCE_AGENT_TOKEN
        sync: false
      # SMTP credentials to actually send the emails above (Gmail requires a 2FA App Password, not
      # the account password) — set in the Render dashboard. MAIL_HOST/MAIL_PORT default to Gmail's
      # smtp.gmail.com:587 (application.yml), so only these two need setting.
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
