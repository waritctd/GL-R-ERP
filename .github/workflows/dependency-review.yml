name: Dependency Review

# Fails a PR that introduces a dependency with a known high+ severity vulnerability
# (software composition analysis gate, issue #21).
on:
  pull_request:

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
