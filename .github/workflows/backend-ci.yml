name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      # Real Postgres so FlywayMigrationTest applies every migration end-to-end
      # (the Mockito unit tests never exercise Flyway).
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: glr_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and test
        run: ./mvnw -B clean verify
        env:
          TEST_DB_URL: jdbc:postgresql://localhost:5432/glr_test
          TEST_DB_USERNAME: postgres
          TEST_DB_PASSWORD: postgres
