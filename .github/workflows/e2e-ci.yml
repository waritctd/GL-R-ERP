name: E2E (Playwright, mock frontend)

# Stage K2 Phase 1 — browser e2e against the mock frontend (VITE_USE_MOCKS=true).
# NON-GATING: intentionally not added as a required check yet. Promote once
# proven stable across a few PR cycles — see docs/agent-handoffs.

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/e2e-ci.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/e2e-ci.yml'

jobs:
  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Get installed Playwright version
        id: playwright-version
        run: echo "version=$(node -e "console.log(require('./package-lock.json').packages['node_modules/@playwright/test'].version)")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright chromium (+ OS deps)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS deps only (browser cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run e2e (Stage K2 Phase 1 — auth + rbac)
        run: npm run test:e2e

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14
