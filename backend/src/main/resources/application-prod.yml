# Production-only overrides. Active when SPRING_PROFILES_ACTIVE=prod.
spring:
  main:
    # Defer bean creation until first use so context refresh finishes sooner. Flyway is
    # force-eager via FlywayEagerInitConfig, so schema migrations still run before traffic.
    lazy-initialization: true
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      # Do not pre-open idle connections during startup. Connections are created on demand,
      # while Flyway still verifies the database during startup.
      minimum-idle: 0
      # Do not block startup waiting on the pool to fill; Flyway still validates DB reachability.
      initialization-fail-timeout: -1
  flyway:
    connect-retries: 3
    connect-retries-interval: 5

app:
  uploads-dir: ${APP_UPLOADS_DIR}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
