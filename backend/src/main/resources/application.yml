server:
  # PORT is injected by the host platform (e.g. Render); fall back to SERVER_PORT, then 8080.
  port: ${PORT:${SERVER_PORT:8080}}
  servlet:
    session:
      # Explicit idle-timeout policy (issue #23); also the max-inactive-interval Spring Session persists.
      timeout: ${APP_SESSION_TIMEOUT:30m}
      cookie:
        name: GLR_HR_SESSION
        http-only: true
        same-site: lax
        secure: ${SERVER_SESSION_COOKIE_SECURE:true}

spring:
  application:
    name: glr-hr-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hris}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: ${DB_MIN_IDLE:1}
      data-source-properties:
        reWriteBatchedInserts: true
  flyway:
    enabled: ${APP_FLYWAY_ENABLED:true}
    schemas: hr,hr_restricted,sales
    default-schema: hr
    baseline-on-migrate: true
    baseline-version: 1
  session:
    # Persist HttpSession in Postgres so it survives restarts and scales across instances (#23).
    store-type: jdbc
    jdbc:
      # Schema is created by Flyway (V19); do not let Spring Session run its own initializer.
      initialize-schema: never
      table-name: hr.spring_session
  sql:
    init:
      mode: never
  jackson:
    deserialization:
      accept-empty-string-as-null-object: true
  servlet:
    multipart:
      max-file-size: ${APP_MAX_FILE_SIZE:10MB}
      max-request-size: ${APP_MAX_REQUEST_SIZE:12MB}
app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174}
  attendance:
    agent-token: ${APP_ATTENDANCE_AGENT_TOKEN:}
  auth:
    # OFF by default: never seed the low-entropy employee_code as a temp login password (guessable
    # before first login). Opt in for local dev only; secure onboarding uses the HR reset endpoint.
    seed-employee-code-passwords: ${APP_AUTH_SEED_EMPLOYEE_CODE_PASSWORDS:false}
  leave:
    advance-notice-days: ${APP_LEAVE_ADVANCE_NOTICE_DAYS:7}
  overtime:
    advance-notice-days: ${APP_OVERTIME_ADVANCE_NOTICE_DAYS:3}
  uploads-dir: ${APP_UPLOADS_DIR:./uploads}
  mail:
    # Resend (HTTP API, not SMTP) - see th.co.glr.hr.mail.ResendMailer for why. Blank api-key is
    # fine for local/dev/CI (no email is ever sent unless something calls ResendMailer.send()).
    resend-api-key: ${APP_MAIL_RESEND_API_KEY:}
    from: ${APP_MAIL_FROM:onboarding@resend.dev}
    # OFF by default (blank): notification emails go to the real employee address as normal. Set only
    # on a test/UAT deployment to redirect every outbound notification email to one real inbox
    # (regardless of the employee's actual/fake seeded address) so the email pipeline itself can be
    # verified without needing real per-employee mailboxes.
    override-to: ${APP_MAIL_OVERRIDE_TO:}
    subject-prefix: ${APP_MAIL_SUBJECT_PREFIX:}
  login-rate-limit:
    enabled: ${APP_LOGIN_RATE_LIMIT_ENABLED:true}
    max-account-failures: ${APP_LOGIN_MAX_ACCOUNT_FAILURES:5}
    max-ip-failures: ${APP_LOGIN_MAX_IP_FAILURES:20}
    window-seconds: ${APP_LOGIN_WINDOW_SECONDS:900}
    lockout-seconds: ${APP_LOGIN_LOCKOUT_SECONDS:900}

management:
  endpoints:
    web:
      exposure:
        include: health          # ONLY health is web-exposed (not beans/env/etc.)
  endpoint:
    health:
      show-details: never        # anonymous-safe UP/DOWN; DB still rolls into the aggregate
      probes:
        enabled: true             # /actuator/health/liveness + /readiness
      # No management.health.mail.enabled override needed: Spring's MailHealthIndicator
      # auto-configures only when spring-boot-starter-mail is on the classpath, and email now goes
      # over Resend's HTTP API (th.co.glr.hr.mail.ResendMailer), not JavaMailSender/SMTP.

logging:
  level:
    th.co.glr.hr: INFO
    # Dedicated channel for PII-access audit events; keep at INFO so they are always emitted.
    th.co.glr.hr.audit: INFO
  pattern:
    level: "%5p [%X{correlationId:-}]"   # ':-' -> empty when absent (e.g. startup logs)
