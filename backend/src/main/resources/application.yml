server:
  # PORT is injected by the host platform (e.g. Render); fall back to SERVER_PORT, then 8080.
  port: ${PORT:${SERVER_PORT:8080}}
  servlet:
    session:
      # Explicit idle-timeout policy (issue #23); also the max-inactive-interval Spring Session persists.
      timeout: ${APP_SESSION_TIMEOUT:30m}
      cookie:
        name: GLR_HR_SESSION
        http-only: true
        same-site: lax
        secure: ${SERVER_SESSION_COOKIE_SECURE:true}

spring:
  application:
    name: glr-hr-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hris}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: ${DB_MIN_IDLE:1}
      data-source-properties:
        reWriteBatchedInserts: true
  flyway:
    enabled: ${APP_FLYWAY_ENABLED:true}
    schemas: hr,hr_restricted,sales,customers,price_catalog
    default-schema: hr
    baseline-on-migrate: true
    baseline-version: 1
  session:
    # Persist HttpSession in Postgres so it survives restarts and scales across instances (#23).
    store-type: jdbc
    jdbc:
      # Schema is created by Flyway (V19); do not let Spring Session run its own initializer.
      initialize-schema: never
      table-name: hr.spring_session
  sql:
    init:
      mode: never
  jackson:
    deserialization:
      accept-empty-string-as-null-object: true
  servlet:
    multipart:
      max-file-size: ${APP_MAX_FILE_SIZE:10MB}
      max-request-size: ${APP_MAX_REQUEST_SIZE:12MB}
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174}
  attendance:
    agent-token: ${APP_ATTENDANCE_AGENT_TOKEN:}
    # Company-wide standard working day. late-minutes / early-leave-minutes derived from these are
    # REPORTING ONLY — Thai Labour Protection Act §76 forbids deducting wages as a penalty for
    # lateness or absence, so they must never feed a payroll deduction.
    schedule:
      zone: ${APP_ATTENDANCE_ZONE:Asia/Bangkok}
      work-start: ${APP_ATTENDANCE_WORK_START:08:30}
      work-end: ${APP_ATTENDANCE_WORK_END:17:30}
      # Threshold, not allowance: at 5 minutes, 08:34 is 0 late but 08:40 is 10 late (from 08:30).
      grace-minutes: ${APP_ATTENDANCE_GRACE_MINUTES:5}
      workdays: ${APP_ATTENDANCE_WORKDAYS:MONDAY,TUESDAY,WEDNESDAY,THURSDAY,FRIDAY}
    daily:
      recalc-enabled: ${APP_ATTENDANCE_RECALC_ENABLED:true}
      recalc-lookback-days: ${APP_ATTENDANCE_RECALC_LOOKBACK_DAYS:7}
      backfill-on-startup: ${APP_ATTENDANCE_BACKFILL_ON_STARTUP:false}
  auth:
    # OFF by default: never seed the low-entropy employee_code as a temp login password (guessable
    # before first login). Opt in for local dev only; secure onboarding uses the HR reset endpoint.
    seed-employee-code-passwords: ${APP_AUTH_SEED_EMPLOYEE_CODE_PASSWORDS:false}
  leave:
    advance-notice-days: ${APP_LEAVE_ADVANCE_NOTICE_DAYS:7}
  overtime:
    # Advance notice was removed on CEO instruction; same-day and retroactive requests are allowed
    # when the reason explains why. APP_OVERTIME_ADVANCE_NOTICE_DAYS is no longer read — remove it
    # from any deployment environment that still sets it.
    retroactive-window-days: ${APP_OVERTIME_RETROACTIVE_WINDOW_DAYS:60}
  special-money:
    payroll-cutoff-day: ${APP_SPECIAL_MONEY_PAYROLL_CUTOFF_DAY:25}
  uploads-dir: ${APP_UPLOADS_DIR:./uploads}
  bot:
    api-token: ${BOT_API_TOKEN:}
  factory-quote-dispatch:
    # Background outbox worker for factory quote request emails (V67). send() only enqueues a
    # PENDING row; FactoryQuoteEmailDispatchWorker sends and finalizes it out-of-band so an app
    # crash between "email accepted" and "quote/pricing-request updated" cannot strand the dispatch.
    poll-interval-ms: ${APP_FACTORY_QUOTE_DISPATCH_POLL_INTERVAL_MS:5000}
    reclaim-timeout-seconds: ${APP_FACTORY_QUOTE_DISPATCH_RECLAIM_TIMEOUT_SECONDS:120}
    max-attempts: ${APP_FACTORY_QUOTE_DISPATCH_MAX_ATTEMPTS:8}
    backoff-base-seconds: ${APP_FACTORY_QUOTE_DISPATCH_BACKOFF_BASE_SECONDS:30}
    batch-size: ${APP_FACTORY_QUOTE_DISPATCH_BATCH_SIZE:20}
  quotation-expiry:
    # Step 5 (V75): flips ISSUED customer quotations whose validity_date has passed to EXPIRED.
    # A single guarded UPDATE per tick — no outbox/claim/retry machinery, unlike
    # factory-quote-dispatch above (this isn't calling an external system).
    sweep-interval-ms: ${APP_QUOTATION_EXPIRY_SWEEP_INTERVAL_MS:3600000}
  login-rate-limit:
    enabled: ${APP_LOGIN_RATE_LIMIT_ENABLED:true}
    max-account-failures: ${APP_LOGIN_MAX_ACCOUNT_FAILURES:5}
    max-ip-failures: ${APP_LOGIN_MAX_IP_FAILURES:20}
    window-seconds: ${APP_LOGIN_WINDOW_SECONDS:900}
    lockout-seconds: ${APP_LOGIN_LOCKOUT_SECONDS:900}
  payroll:
    # Employer registration constants stamped into the statutory export files (KBank PCT, PND1,
    # SSO สปส.1-10). Blank by default so nothing bogus reaches a real bank/tax/SSO filing — set the
    # real values per environment via these env vars. Demo values live in application-demo.yml.
    employer:
      company-name-th: ${APP_PAYROLL_COMPANY_NAME_TH:}
      company-tax-id: ${APP_PAYROLL_COMPANY_TAX_ID:}
      pnd1-branch: ${APP_PAYROLL_PND1_BRANCH:0000}
      kbank-debit-account: ${APP_PAYROLL_KBANK_DEBIT_ACCOUNT:}
      kbank-batch-ref: ${APP_PAYROLL_KBANK_BATCH_REF:}
      sso-employer-account: ${APP_PAYROLL_SSO_EMPLOYER_ACCOUNT:}
      sso-branch: ${APP_PAYROLL_SSO_BRANCH:000000}
      sso-rate-percent: ${APP_PAYROLL_SSO_RATE_PERCENT:5}
      establishment-name: ${APP_PAYROLL_ESTABLISHMENT_NAME:}
      default-transfer-day: ${APP_PAYROLL_DEFAULT_TRANSFER_DAY:26}

management:
  endpoints:
    web:
      exposure:
        include: health          # ONLY health is web-exposed (not beans/env/etc.)
  endpoint:
    health:
      show-details: never        # anonymous-safe UP/DOWN; DB still rolls into the aggregate
      probes:
        enabled: true             # /actuator/health/liveness + /readiness
  health:
    mail:
      # The mail health indicator opens a live SMTP connection to spring.mail.host on every check.
      # That's an outbound-egress dependency having nothing to do with this app's liveness (mail is
      # used only for the async factory Import Request notification), and it flips the aggregate
      # health to DOWN in any sandboxed/offline environment. Excluded so /actuator/health reflects
      # this app's own readiness (DB) rather than a third-party SMTP host's reachability.
      enabled: false

logging:
  level:
    th.co.glr.hr: INFO
    # Dedicated channel for PII-access audit events; keep at INFO so they are always emitted.
    th.co.glr.hr.audit: INFO
  pattern:
    level: "%5p [%X{correlationId:-}]"   # ':-' -> empty when absent (e.g. startup logs)
