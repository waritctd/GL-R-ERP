# UAT-only overrides. Active when SPRING_PROFILES_ACTIVE=uat (set by the gl-r-erp-uat Render service).
#
# Mirrors application-prod.yml (same Render cold-start rationale) but swaps the Flyway seed location:
# UAT applies db/migration-uat (synthetic, PII-free test data) instead of the demo seed. The two are
# mutually exclusive — a service is either prod (demo seed) or uat (UAT seed), never both.
#
# NOTE: Flyway validates version numbers across ALL configured locations combined. db/migration-uat
# files use the V900+ range to stay clear of the real db/migration V1..VNN range and its future
# additions. Check both directories before adding a UAT migration, or the uat-profile deploy fails at
# validate().
spring:
  main:
    lazy-initialization: true
  datasource:
    # UAT runs on the same Render starter plan against the same Supabase (Tokyo) region as prod, so it
    # needs the identical cold-start tuning (see application-prod.yml for the full rationale): don't
    # pre-open idle connections during startup, and never block startup waiting on the pool to fill.
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      minimum-idle: 0
      initialization-fail-timeout: -1
  flyway:
    connect-retries: 3
    connect-retries-interval: 5
    locations: classpath:db/migration,classpath:db/migration-uat
    # The UAT DB already has db/migration-uat V900-V904 applied. main's newer real migrations
    # (V37-V39, from the post-quotation sales flow merge) land BELOW that version, so on the next
    # deploy Flyway would see them as "new migrations below the current schema version" and fail
    # validate() with default out-of-order=false. Safe here because V37-V39 are purely additive
    # (V37 adds unit_basis NOT NULL DEFAULT 'PIECE' with a backfill; V38/V39 add nullable columns)
    # and V903's seed data predates and never references these columns (grepped clean). On a fresh
    # DB migrations still apply in numeric order (V1..V39 then V900..V904); only an already-seeded
    # UAT DB takes the out-of-order path.
    out-of-order: true

# Email transport — UAT mirrors prod's SMTP path (staging should behave like production).
# prod (application-prod.yml + application.yml) sends via Spring's JavaMailSender over
# spring.mail.* (smtp.gmail.com:587 / STARTTLS by default, creds from MAIL_USERNAME/PASSWORD).
# UAT uses the app.mail.* Mailer abstraction's `smtp` provider (SmtpMailer) — the SAME underlying
# SMTP/JavaMailSender transport, just selected via config instead of Spring auto-config. Defaults
# below mirror prod so the service BOOTS with no crash-loop (SmtpMailer refuses to start on a blank
# host); every value is env-overridable on the Render dashboard.
#
# ⚠️ NOT YET FUNCTIONAL — no real relay/credentials are configured. Until they are, notification
# sends best-effort-FAIL and are logged (identical to prod running with empty MAIL creds); and
# attachment emails (e.g. factory-quote sends) will surface an error because that path rethrows.
# To make it live + testable on gl-r-erp-uat, set on the Render dashboard (sync:false secrets for
# the credentials):
#   APP_MAIL_SMTP_HOST=<real relay>   APP_MAIL_SMTP_USERNAME=<user>   APP_MAIL_SMTP_PASSWORD=<secret>
#   APP_MAIL_FROM=<from address>      APP_MAIL_OVERRIDE_TO=<one test inbox>  # redirect ALL staging
#                                     mail to a single inbox so staging never emails real people
# Then come back and verify delivery end-to-end (the MAIL-* tests capture via SMTP→Mailpit in the
# Docker stack; docker-compose.uat.yml already points SmtpMailer at Mailpit).
app:
  mail:
    provider: ${APP_MAIL_PROVIDER:smtp}
    from: ${APP_MAIL_FROM:job@glr.co.th}
    override-to: ${APP_MAIL_OVERRIDE_TO:}
    smtp:
      host: ${APP_MAIL_SMTP_HOST:smtp.gmail.com}
      port: ${APP_MAIL_SMTP_PORT:587}
      starttls: ${APP_MAIL_SMTP_STARTTLS:true}
      username: ${APP_MAIL_SMTP_USERNAME:}
      password: ${APP_MAIL_SMTP_PASSWORD:}
